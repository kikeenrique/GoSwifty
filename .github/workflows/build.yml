name: project

on: ["push", "workflow_dispatch"]

jobs:
  build-app:
    name: Build App
    strategy:
        fail-fast: false
        matrix:
            os: [macos-26]
            build_type: ['release']
            run-config:
                - { xcode_version: '26.2', simulator: 'name=iPhone 17 Pro,OS=26.2' }
                - { xcode_version: '26.6', simulator: 'name=iPhone 17 Pro,OS=26.5' }

    runs-on: ${{ matrix.os }}
    env:
        DEVELOPER_DIR: /Applications/Xcode_${{ matrix.run-config['xcode_version'] }}.app/Contents/Developer
        DESTINATION: platform=iOS Simulator,${{ matrix.run-config['simulator'] }}
    steps:
        - uses: actions/checkout@v4

        - name: Cache Swift Package Manager
          uses: actions/cache@v6
          with:
            path: |
              .build/checkouts
              .build/repositories
            key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
            restore-keys: |
              ${{ runner.os }}-spm-

        - name: Prepare shell
          run: |
            set -o pipefail

        - name: Build
          run: |
            swift build -c release
